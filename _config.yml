title: Trackmania Galaxy Wiki
description: A comprehensive wiki for Trackmania Galaxy — maps, records, guides, and more.
baseurl: "/trackmania-galaxy.github.io"
url: "https://tomekdot.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Just the Docs configuration
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

heading_anchors: true

# Navigation
nav_sort: case_insensitive

# Footer
footer_content: "Trackmania Galaxy Wiki — Community maintained."

color_scheme: dark

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.gem"
  - "*.gemspec"
  - README.md
