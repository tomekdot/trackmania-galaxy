name: Map feedback
about: Suggest changes or add notes for a map page
labels: [map-feedback]
title: "[Map] "
body:
  - type: input
    id: map-name
    attributes:
      label: Map name
      placeholder: Canyon, Desert, or another map name
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What should be changed or added?
      placeholder: Add route notes, screenshots, comments, or historical info here.
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Links or references
      description: Optional links to screenshots, replays, or other references.
      placeholder: https://...
